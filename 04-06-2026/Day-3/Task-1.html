<!-- 2)Implement input field validations. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Form Validations:</h1>
    <form id="myForm" onsubmit="return validateForm()">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" placeholder="Enter Name"><br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="@gmail.com"><br>
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" placeholder="password"><br>
    <label for="confirmpassword">Confirm Pssword:</label>
    <input type="password" id="confirmpassword" name="confirmpassword" placeholder="confirm Password"><br>
    <label for="gender">Gender:</label>
    <select id="gender" name="gender">
        <option value="">select</option>
        <option value="male">male</option>
        <option value="female">female</option>
    </select><br>
    <button type="submit">submit</button>
    </form>
    <script src="Task-1.js"></script>
</body>
</html>
