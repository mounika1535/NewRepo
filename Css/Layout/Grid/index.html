<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            background-color: rgb(226, 115, 115);
            padding: 2px;
            margin:5px;
            border:2px solid black ;
        }
        #main{
            display: grid;
            /*grid-template-columns:100px  200px 100px;*/
            grid-template-columns:1fr 2fr 1fr;
            /*grid-template-rows:100px  200px 100px;*/
        }
        #box1{
            grid-column-start: 1;
            grid-column-end: 4;
        }
        #box2{
            grid-column-start: 2;
            grid-column-end: 4;
        }
        #box3{
            grid-column-start: 2;
            grid-column-end: 3;
        }
        #box4{
          /*grid-column-start: 1;
            grid-column-end: 4;*/
            grid-column: 1/3;
        }
    </style>
</head>
<body>
    <div style="background-color: aqua; width:500px;height: 400px;"id="main">
        <div class="box" id="box1">
           box1
        </div>
        <div class="box" id="box2">
           box2
        </div>
        <div class="box" id="box3">
           box3
        </div>
        <div class="box" id="box4">
           box4
        </div>
        <div class="box" id="box5">
           box5
        </div>
        <div class="box" id="box6">
           box6
        </div>
        <div class="box" id="box7">
           box7
        </div>
    </div>
</body>
</html>
