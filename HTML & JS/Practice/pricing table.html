<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Table</title>
    <style>
        #container{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .content{
            border: 2px solid black;
            width: 200px;
            height: 250px;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }
        .content:hover{
            transform: scale(1.05);
            background-color: rgb(113, 87, 53);
        }
        #container div:nth-child(2){
            background-color: rgb(232, 129, 129);
        }
        li
        {
            list-style-type: none;
        }
    </style>
</head>
<body><center>
    <div id="container">
        <div class="content">
            <h3>Basic</h3>
            <li>Price: $200</li>
            features
            <li>feature 1</li>
            <li>feature 2</li>
            <li>feature 3</li>
            <br><br>
            <button>Buy</button>
        </div>
        <div class="content">
            <h3>Standard</h3>
            <li>Price: $300</li>
            features
            <li>feature 1</li>
            <li>feature 2</li>
            <li>feature 3</li>
            <br><br>
            <button>Buy</button>
        </div>
        <div class="content">
            <h3>Premium</h3>
            <li>Price: $400</li>
            features
            <li>feature 1</li>
            <li>feature 2</li>
            <li>feature 3</li>
            <br><br>
            <button>Buy</button>
        </div>
    </div>
    </center>
</body>
</html>
